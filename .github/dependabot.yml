version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    # Don't auto-PR major bumps. They almost always need a config or API
    # migration (tailwindcss 3→4 broke the build, typescript 5→6 risked the
    # type tree). Run `npm outdated` manually and upgrade majors deliberately.
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    # Same policy as npm: action majors often change inputs / outputs, so
    # bump them manually after reading the release notes.
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
