name: Dependency audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly run catches advisories published against existing pinned versions.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: npm audit (high severity and above)
        run: npm audit --audit-level=high
